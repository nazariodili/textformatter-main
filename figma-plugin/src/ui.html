<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Formatter</title>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #ffffff;
        color: #1b2437;
        font-family: "Inter", "SF Pro Text", "SF Pro Display", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="tf-boot" style="padding:16px;font-size:14px;color:#5a6472;">
        Sto aprendo il plugin...
      </div>
    </div>
    <script>
      window.addEventListener("error", (event) => {
        const boot = document.getElementById("tf-boot");
        if (boot) {
          boot.textContent = "Si è verificato un errore. Apri la Console del plugin per i dettagli.";
        }
      });
      setTimeout(() => {
        if (!window.__tf_booted) {
          const boot = document.getElementById("tf-boot");
          if (boot) {
            boot.textContent = "Non riesco a caricare l'interfaccia. Prova a ricompilare il plugin.";
          }
        }
      }, 1200);
    </script>
    </script>
    <!-- UI_SCRIPT -->
  </body>
</html>
